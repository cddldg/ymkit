        const DEFAULT_MARKDOWN = `# 探索 Markdown 优雅排版艺术

微信公众号支持极其丰富的富文本展现形式，本工具能一键将规范的 **Markdown** 转换为满足微信后台渲染要求的排版。

## 💡 为什么需要专门的微信排版？
微信后台编辑器会过滤掉很多外部 **CSS 样式表**。我们的转换引擎会将样式**深度转换为行内样式 (Inline Style)**，确保排版万无一失。

> **微信提示**：你可以在左边无限度修改属性，也可以按住编辑器与预览区中间的“分割线”自由拖动占比。

        function App() {
            const [markdown, setMarkdown] = useState(DEFAULT_MARKDOWN);
            const [currentTheme, setCurrentTheme] = useState(THEMES[0]);
            
            // 全局可调节属性状态
            const [primaryColor, setPrimaryColor] = useState(THEMES[0].primaryColor);
            const [secondaryColor, setSecondaryColor] = useState(THEMES[0].secondaryColor);
            const [textColor, setTextColor] = useState(THEMES[0].textColor);
            const [fontSize, setFontSize] = useState(15);
            const [lineHeight, setLineHeight] = useState(1.8);
            const [letterSpacing, setLetterSpacing] = useState(1);
            const [paraMargin, setParaMargin] = useState(16);
            
            const [h2Style, setH2Style] = useState('border-bottom'); 
            const [fontFamily, setFontFamily] = useState('sans-serif'); 
            const [textAlign, setTextAlign] = useState('justify'); 
            const [firstLineIndent, setFirstLineIndent] = useState(false); 
            const [bqBorder, setBqBorder] = useState(4); 
            const [bqRadius, setBqRadius] = useState(4); 
            const [codeTheme, setCodeTheme] = useState('monokai'); 

            const [bgOption, setBgOption] = useState(BACKGROUNDS[0]);

            // 拖曳及布局模式
            const [editorWidth, setEditorWidth] = useState(50); 
            const [viewMode, setViewMode] = useState('phone'); 
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [toastMessage, setToastMessage] = useState("");
            const [copySuccess, setCopySuccess] = useState(false);
            const [themeMode, setThemeMode] = useState('light'); 

            const containerRef = useRef(null);
            const isDragging = useRef(false);
            const previewRef = useRef(null);

            // 🌟 首次挂载后平滑淡出并卸载预加载遮罩
            useEffect(() => {
                const loader = document.getElementById('app-preloader');
                if (loader) {
                    loader.style.opacity = '0';
                    loader.style.visibility = 'hidden';
                    setTimeout(() => {
                        loader.remove();
                    }, 300);
                }
            }, []);

            // 状态恢复：从 LocalStorage 读取保存的配置
            useEffect(() => {
                const savedState = localStorage.getItem("wechat_editor_state2");
                if (savedState) {
                    try {
                        const parsed = JSON.parse(savedState);
                        if (parsed.markdown) setMarkdown(parsed.markdown);
                        if (parsed.fontSize) setFontSize(parsed.fontSize);
                        if (parsed.primaryColor) setPrimaryColor(parsed.primaryColor);
                        if (parsed.secondaryColor) setSecondaryColor(parsed.secondaryColor);
                        if (parsed.textColor) setTextColor(parsed.textColor);
                        if (parsed.lineHeight) setLineHeight(parsed.lineHeight);
                        if (parsed.letterSpacing) setLetterSpacing(parsed.letterSpacing);
                        if (parsed.paraMargin) setParaMargin(parsed.paraMargin);
                        if (parsed.h2Style) setH2Style(parsed.h2Style);
                        if (parsed.fontFamily) setFontFamily(parsed.fontFamily);
                        if (parsed.textAlign) setTextAlign(parsed.textAlign);
                        if (parsed.firstLineIndent !== undefined) setFirstLineIndent(parsed.firstLineIndent);
                        if (parsed.bqBorder) setBqBorder(parsed.bqBorder);
                        if (parsed.bqRadius !== undefined) setBqRadius(parsed.bqRadius);
                        if (parsed.themeMode !== undefined) setThemeMode(parsed.themeMode);
                        if (parsed.codeTheme !== undefined) setCodeTheme(parsed.codeTheme);
                        if (parsed.bgOptionId) {
                            const matchedBg = BACKGROUNDS.find(b => b.id === parsed.bgOptionId);
                            if (matchedBg) setBgOption(matchedBg);
                        }
                    } catch(e) { console.error("加载本地存储状态异常", e); }
                }
            }, []);

            // 侦听变化：自动保存到 LocalStorage
            useEffect(() => {
                const stateToSave = {
                    markdown, fontSize, primaryColor, secondaryColor, textColor,
                    lineHeight, letterSpacing, paraMargin, h2Style, fontFamily,
                    textAlign, firstLineIndent, bqBorder, bqRadius, themeMode, codeTheme, bgOptionId: bgOption.id
                };

                localStorage.setItem("wechat_editor_state2", JSON.stringify(stateToSave));
            }, [markdown, fontSize, primaryColor, secondaryColor, textColor, lineHeight, letterSpacing, paraMargin, h2Style, fontFamily, textAlign, firstLineIndent, bqBorder, bqRadius, themeMode, codeTheme, bgOption]);

            // 双向面板无级拖拽改变比例
            const handleMouseDown = (e) => {
                e.preventDefault();
                isDragging.current = true;
                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
            };

            const handleMouseMove = (e) => {
                if (!isDragging.current || !containerRef.current) return;
                const containerRect = containerRef.current.getBoundingClientRect();
                const relativeX = e.clientX - containerRect.left;
                const percentage = (relativeX / containerRect.width) * 100;
                setEditorWidth(Math.max(20, Math.min(80, percentage)));
            };

            const handleMouseUp = () => {
                isDragging.current = false;
                document.removeEventListener('mousemove', handleMouseMove);
                document.removeEventListener('mouseup', handleMouseUp);
            };

            const handleThemeSelect = (theme) => {
                setCurrentTheme(theme);
                setPrimaryColor(theme.primaryColor);
                setSecondaryColor(theme.secondaryColor);
                setTextColor(theme.textColor);
                setH2Style(theme.h2Style);
                setBqBorder(theme.blockquoteBorder);
                setBqRadius(theme.blockquoteRadius);
            };

            const triggerToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(""), 3000);
            };

            // 将选中的背景模式翻译成兼容微信公众号后台的 inline Style
            const getBgStyleInline = (bg) => {
                const basePaddingStyle = "padding: 24px 20px; box-sizing: border-box; min-height: 100%; border-radius: 8px;";
                if (bg.id === 'grid') {
                    return `${basePaddingStyle} background-color: #ffffff; background-image: linear-gradient(#e2e8f0 1px, transparent 1px), linear-gradient(90deg, #e2e8f0 1px, transparent 1px); background-size: 20px 20px;`;
                } else if (bg.id === 'dots') {
                    return `${basePaddingStyle} background-color: #fafbfc; background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 16px 16px;`;
                } else if (bg.id === 'lined') {
                    return `${basePaddingStyle} background-color: #fcfdfd; background-image: linear-gradient(#e2e8f0 1px, transparent 1px); background-size: 100% 26px;`;
                } else {
                    return `${basePaddingStyle} background-color: ${bg.color};`;
                }
            };

            // Markdown 编译及行内样式强制化引擎 (useMemo 避免卡顿)
            const convertedHtml = useMemo(() => {
                try {
                    marked.setOptions({ gfm: true, breaks: true });
                    const rawHtml = marked.parse(markdown);

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(`<div>${rawHtml}</div>`, 'text/html');
                    const rootNode = doc.body.firstChild;

                    let cssFontFamily = '';
                    if (fontFamily === 'serif') {
                        cssFontFamily = 'font-family: Optima, Georgia, "Nimbus Roman No9 L", "Songti SC", "Noto Serif CJK SC", "Source Han Serif SC", "Source Han Serif CN", STSong, "AR PL New Sung", "AR PL SungtiL GB", serif;';
                    } else if (fontFamily === 'monospace') {
                        cssFontFamily = 'font-family: Consolas, Monaco, "Andale Mono", "Ubuntu Mono", monospace;';
                    } else {
                        cssFontFamily = 'font-family: -apple-system-font, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif;';
                    }

                    const activeCodeTheme = CODE_THEMES.find(t => t.id === codeTheme) || CODE_THEMES[0];

                    const styles = {
                        h1: `font-size: ${fontSize + 4}px; font-weight: bold; color: ${primaryColor}; margin-top: 24px; margin-bottom: 16px; line-height: 1.3; text-align: left; ${cssFontFamily}`,
                        h2: `font-size: ${fontSize + 2}px; font-weight: bold; color: ${primaryColor}; margin-top: 22px; margin-bottom: 14px; line-height: 1.4; text-align: left; ${cssFontFamily}`,
                        h3: `font-size: ${fontSize + 1}px; font-weight: bold; color: ${primaryColor}; margin-top: 18px; margin-bottom: 10px; line-height: 1.4; text-align: left; ${cssFontFamily}`,
                        p: `font-size: ${fontSize}px; color: ${textColor}; line-height: ${lineHeight}; letter-spacing: ${letterSpacing}px; margin-top: ${paraMargin}px; margin-bottom: ${paraMargin}px; text-align: ${textAlign}; word-break: break-all; ${firstLineIndent ? 'text-indent: 2em;' : ''} ${cssFontFamily}`,
                        blockquote: `border-left: ${bqBorder}px solid ${primaryColor}; background-color: ${primaryColor}0c; padding: 12px 16px; margin: 16px 0; border-radius: ${bqRadius}px; color: ${textColor}d0; font-size: ${fontSize - 1}px; line-height: 1.7; ${cssFontFamily}`,
                        pre: `background-color: ${activeCodeTheme.bg}; color: ${activeCodeTheme.text}; border: ${activeCodeTheme.border}; padding: 14px; border-radius: 8px; overflow-x: auto; font-family: Consolas, Monaco, monospace; font-size: 13px; line-height: 1.5; margin: 16px 0;`,
                        code: `background-color: ${primaryColor}15; color: ${primaryColor}; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: ${fontSize - 1}px; word-break: break-all;`,
                        ul: `list-style-type: disc; padding-left: 20px; margin: 12px 0; font-size: ${fontSize}px; color: ${textColor}; ${cssFontFamily}`,
                        ol: `list-style-type: decimal; padding-left: 20px; margin: 12px 0; font-size: ${fontSize}px; color: ${textColor}; ${cssFontFamily}`,
                        li: `margin-bottom: 6px; line-height: ${lineHeight}; letter-spacing: ${letterSpacing}px;`,
                        strong: `font-weight: bold; color: ${primaryColor};`,
                        em: `font-style: italic;`,
                        a: `color: ${primaryColor}; text-decoration: underline;`,
                        table: `width: 100%; border-collapse: collapse; margin: 16px 0; font-size: ${fontSize - 1}px; overflow-x: auto; display: block;`,
                        th: `background-color: ${primaryColor}; color: #ffffff; padding: 8px 12px; border: 1px solid #e2e8f0; font-weight: bold; text-align: left;`,
                        td: `padding: 8px 12px; border: 1px solid #e2e8f0; text-align: left; color: ${textColor};`,
                        hr: `border: 0; border-top: 1px solid ${secondaryColor}cc; margin: 24px 0;`
                    };

                    const applyCustomCssRules = (element, tag) => {
                        if (tag === 'h2') {
                            if (h2Style === 'border-bottom') {
                                element.setAttribute('style', `${styles.h2} border-bottom: 2px solid ${primaryColor}; padding-bottom: 6px; display: inline-block;`);
                            } else if (h2Style === 'border-left') {
                                element.setAttribute('style', `${styles.h2} border-left: 5px solid ${primaryColor}; padding-left: 10px;`);
                            } else if (h2Style === 'bubble') {
                                element.setAttribute('style', `${styles.h2} background-color: ${primaryColor}1a; border-radius: 6px; padding: 6px 12px; display: inline-block; color: ${primaryColor};`);
                            } else if (h2Style === 'short-dash') {
                                element.setAttribute('style', `${styles.h2} text-align: center; font-weight: bold;`);
                                element.innerHTML = `<span style="color: ${secondaryColor}; font-weight: normal; margin: 0 8px;">—</span> ${element.innerText} <span style="color: ${secondaryColor}; font-weight: normal; margin: 0 8px;">—</span>`;
                            }
                        }
                    };

                    const traverse = (element) => {
                        if (!element || element.nodeType !== 1) return;
                        const tag = element.tagName.toLowerCase();
                        if (styles[tag]) {
                            element.setAttribute('style', styles[tag]);
                            applyCustomCssRules(element, tag);
                        }
                        if (tag === 'pre') {
                            const innerCode = element.querySelector('code');
                            if (innerCode) {
                                innerCode.setAttribute('style', 'background: transparent; color: inherit; padding: 0; font-family: inherit; font-size: inherit;');
                            }
                        }
                        Array.from(element.childNodes).forEach(traverse);
                    };

                    Array.from(rootNode.childNodes).forEach(traverse);
                    return rootNode.innerHTML;
                } catch (e) {
                    console.error("排版转换异常: ", e);
                    return `<p class="text-rose-500">解析发生错误，请检查您的 Markdown 格式是否包含非法标签。</p>`;
                }
            }, [markdown, primaryColor, secondaryColor, textColor, fontSize, lineHeight, letterSpacing, paraMargin, h2Style, fontFamily, textAlign, firstLineIndent, bqBorder, bqRadius, codeTheme]);

            // 🌟 工业级高兼容剪贴板拷贝驱动 (基于事件劫持注入，无 DOM 节点和 Selection 依赖，完美绕开各种沙盒拦截)
            const performSystemCopy = (content, asRichText = false) => {
                try {
                    const listener = (e) => {
                        if (asRichText) {
                            // 关键核心：向剪贴板写入精准富文本格式
                            e.clipboardData.setData('text/html', content);
                            
                            // 极重要降级处理：提取纯文本填充到 text/plain 分流，彻底杜绝部分文本编辑器粘贴出空白的情况
                            const tempDiv = document.createElement('div');
                            tempDiv.innerHTML = content;
                            const plainText = tempDiv.textContent || tempDiv.innerText || '';
                            e.clipboardData.setData('text/plain', plainText);
                        } else {
                            e.clipboardData.setData('text/plain', content);
                        }
                        e.preventDefault(); // 阻止浏览器对选区的默认空白复制，强制使用我们定制的 Payload
                    };

                    // 绑定瞬时监听器 -> 触发原生复制指令 -> 注销监听器
                    document.addEventListener('copy', listener);
                    const successful = document.execCommand('copy');
                    document.removeEventListener('copy', listener);

                    // 如果 execCommand 因为某些极端沙盒完全受限，使用现代 Clipboard API 兜底
                    if (!successful && navigator.clipboard) {
                        if (!asRichText) {
                            navigator.clipboard.writeText(content);
                            return true;
                        }
                    }

                    return successful;

                            <div class="flex items-center justify-between border-b px-4 py-2.5 text-xs shrink-0 ${themeMode === 'dark' ? 'border-slate-800 bg-slate-900/40 text-slate-300' : 'border-slate-200 bg-slate-50 text-slate-700'}">
                                <div class="flex items-center gap-1.5 font-semibold">
                                    <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                                    <span>编辑 Markdown 正文</span>
                                </div>
                                <span class="text-[10px]">左右拖拽中间分界线调节视野</span>
                            </div>

                            <div class="flex-1 relative">
                                <textarea
                                    value=${markdown}
                                    oninput=${(e) => setMarkdown(e.target.value)}
                                    placeholder="在此输入您的 Markdown 正文内容..."
                                    class="w-full h-full p-5 focus:outline-none focus:ring-0 resize-none font-mono text-[14px] leading-relaxed transition-colors duration-300 ${themeMode === 'dark' ? 'text-slate-300 bg-slate-950' : 'text-slate-800 bg-white'}"
                                />
                            </div>
                        </section>

                        <!-- 🌟 左右核心随意拖动分界线 dragger -->
                        <div 
                            onmousedown=${handleMouseDown}
                            class="w-1.5 cursor-col-resize transition-all h-full shrink-0 flex items-center justify-center relative group ${themeMode === 'dark' ? 'bg-slate-800 hover:bg-emerald-500' : 'bg-slate-200 hover:bg-emerald-500'}"
                        >
                            <div class="absolute w-4 h-8 rounded bg-slate-700 border border-slate-600 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-20">
                                <svg class="w-3 h-3 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l4-4 4 4m0 6l-4 4-4-4"></path>
                                </svg>
                            </div>
                        </div>

                        <!-- 3. 右侧：全高公众号实时预览区 -->
                        <section class="flex-1 flex flex-col overflow-hidden transition-colors duration-300 ${themeMode === 'dark' ? 'bg-slate-900' : 'bg-slate-100'}">
                            
                            <!-- 手机预览与源代码视图选项卡 -->
                            <div class="flex items-center justify-between px-4 py-2 border-b text-xs shrink-0 ${themeMode === 'dark' ? 'border-slate-800 bg-slate-950' : 'border-slate-200 bg-white'}">
                                <div class="flex items-center gap-1 p-0.5 rounded-lg ${themeMode === 'dark' ? 'bg-slate-800' : 'bg-slate-200/60'}">
                                    <button
                                        onclick=${() => setViewMode('phone')}
                                        class="px-3 py-1 rounded-md transition-all font-semibold ${
                                            viewMode === 'phone' 
                                                ? (themeMode === 'dark' ? 'bg-slate-700 text-white' : 'bg-white text-slate-850 shadow-sm') 
                                                : (themeMode === 'dark' ? 'text-slate-400 hover:text-slate-200' : 'text-slate-600 hover:text-slate-900')
                                        }"
                                    >
                                        📱 高仿真手机预览
                                    </button>
                                    <button
                                        onclick=${() => setViewMode('rawHtml')}
                                        class="px-3 py-1 rounded-md transition-all font-semibold ${
                                            viewMode === 'rawHtml' 
                                                ? (themeMode === 'dark' ? 'bg-slate-700 text-white' : 'bg-white text-slate-850 shadow-sm') 
                                                : (themeMode === 'dark' ? 'text-slate-400 hover:text-slate-200' : 'text-slate-600 hover:text-slate-900')
                                        }"
                                    >
                                        微信行内 HTML
                                    </button>
                                </div>
                            </div>

                            <!-- 主模拟器内容容器 -->
                            <div class="flex-1 overflow-y-auto p-4 flex justify-center items-start">
                                ${viewMode === 'phone' ? html`
                                    <!-- 高保真手机窗口模拟 -->
                                    <div class="w-[375px] max-w-full bg-white rounded-[32px] border-[12px] shadow-2xl overflow-hidden flex flex-col my-4 select-text ${themeMode === 'dark' ? 'border-slate-950' : 'border-slate-800'}">
                                        
                                        <!-- 系统模拟顶部条 -->
                                        <div class="bg-slate-950 text-white px-6 py-2.5 flex justify-between items-center text-[10px] select-none">
                                            <span class="font-semibold">09:41</span>
                                            <div class="w-16 h-4 bg-slate-800 rounded-full flex items-center justify-center text-[8px] font-bold text-slate-400">
                                                微信公众号
                                            </div>
                                            <div class="flex items-center gap-1">
                                                <span>📶</span>
                                                <span>5G</span>
                                            </div>
                                        </div>

                                        <!-- 微信界面头部导航 -->
                                        <div class="bg-white border-b border-slate-100 px-4 py-3 flex items-center justify-between text-slate-800 shrink-0 select-none">
                                            <div class="flex items-center gap-2">
                                                <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                                                </svg>
                                                <span class="font-bold text-xs truncate max-w-[180px]">公众号推文预览</span>
                                            </div>
                                            <div class="flex gap-1 flex-shrink-0">
                                                <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                                                <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                                                <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                                            </div>
                                        </div>

                                        <!-- 核心富文本渲染宿主区 (绑定背景纹理) -->
                                        <div 
                                            ref=${previewRef}
                                            class="flex-1 overflow-y-auto p-5 wechat-font min-h-[480px] ${bgOption.class}"
                                            style="${bgOption.class.startsWith('bg-[') ? `background-color: ${bgOption.color}` : ''}"
                                            dangerouslySetInnerHTML=${{ __html: convertedHtml }}
                                        />
                                    </div>
                                ` : html`
                                    <!-- 高精度含行内样式的 HTML 源码审查区 -->
                                    <div class="w-full max-w-2xl rounded-xl p-5 font-mono text-xs overflow-x-auto shadow-lg ${themeMode === 'dark' ? 'bg-slate-950 text-slate-300' : 'bg-white text-slate-700 border border-slate-200'}">
                                        <div class="flex justify-between items-center border-b pb-3 mb-3 select-none ${themeMode === 'dark' ? 'border-slate-800 text-slate-400' : 'border-slate-200 text-slate-500'}">
                                            <span>纯净公众号行内样式源码 (安全转义机制)</span>
                                            <button 
                                                onclick=${handleCopyRawHtml}
                                                class="px-2.5 py-1 rounded font-semibold ${themeMode === 'dark' ? 'bg-slate-800 hover:bg-slate-700 text-emerald-400' : 'bg-slate-100 hover:bg-slate-200 text-emerald-600'}"
                                            >
                                                复制源码
                                            </button>
                                        </div>
                                        <pre class="whitespace-pre-wrap word-break break-all select-all">${convertedHtml}</pre>
                                    </div>
                                `}
                            </div>
                        </section>

                    </main>

                    <!-- 全局通知框 (Toast) -->
                    ${toastMessage ? html`
                        <div class="fixed bottom-6 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50 text-sm border animate-fade-in ${
                            themeMode === 'dark' ? 'bg-slate-850/95 border-slate-800 text-white' : 'bg-white/95 border-slate-200 text-slate-850'
                        }">
                            <span class="text-emerald-400">✨</span>
                            <p>${toastMessage}</p>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('root'));
    </script>
