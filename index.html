* { margin:0; padding:0; box-sizing:border-box; }

body {

  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

a { color: inherit; text-decoration: none; }

/* Header */
.header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top:0; z-index:100;
}
.header-inner {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  height: 60px;
  gap: 28px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 20px;
  font-weight: 700;
  color: var(--red);
  white-space: nowrap;
}
.logo svg { width:28px; height:28px; flex-shrink:0; }
.nav { display:flex; gap:6px; }
.nav a {
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 14px;
  color: #444;
  transition: all 0.15s;
}
.nav a:hover, .nav a.active { color: var(--red); background: var(--red-light); }

.header-right { margin-left: auto; display:flex; align-items:center; gap:12px; }
.search-box {
  display:flex; align-items:center;
  background: #f5f5f5;
  border-radius: 20px;
  padding: 0 14px;
  height: 36px;
  transition: all 0.2s;
}
.search-box:focus-within { background: #fff; box-shadow: 0 0 0 2px var(--red-light); }
.search-box input {
  border: none; background: transparent;
  outline: none; font-size: 13px; width: 160px;
  font-family: inherit;
}
.search-box svg { width:16px; height:16px; stroke: #999; fill:none; stroke-width:2; flex-shrink:0; }

/* Hero */
.hero {
  background: linear-gradient(135deg, #fff 0%, #fff5f5 100%);
  border-bottom: 1px solid var(--border);
  text-align: center;
  padding: 48px 20px 36px;
}
.hero h1 { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.hero p { font-size: 15px; color: var(--text-secondary); margin-bottom: 6px; }
.hero .stats {
  display:flex; justify-content:center; gap:32px;
  margin-top: 20px; font-size:13px; color: var(--text-muted);
}
.hero .stats strong { color: var(--red); font-size:18px; }

/* Category tabs */
.tabs-wrap {
  max-width: 1300px; margin: 0 auto; padding: 0 20px;
}
.tabs {
  display:flex; gap:4px; padding: 20px 0 0;
  flex-wrap: wrap;
}
.tab {
  padding: 8px 20px; border-radius: 20px;
  font-size: 14px; cursor: pointer;
  background: #fff; color: #555;
  border: 1px solid var(--border);
  transition: all 0.15s;
  user-select: none;
}
.tab:hover { border-color: var(--red); color: var(--red); }
.tab.active { background: var(--red); color: #fff; border-color: var(--red); }

/* Search local */
.local-search {
  max-width: 1300px; margin: 0 auto; padding: 16px 20px 0;
}
.local-search input {
  width: 100%; padding: 10px 18px;
  border: 1px solid var(--border); border-radius: 22px;
  font-size: 14px; outline: none; background: #fff;
  font-family: inherit;
  transition: border-color 0.2s;
}
.local-search input:focus { border-color: var(--red); }
.local-search input::placeholder { color: #bbb; }

/* Tool grid */
.tools-container {
  max-width: 1300px; margin: 0 auto; padding: 16px 20px 40px;
}
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.tool-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all 0.2s;
  display:flex; flex-direction:column;
  position: relative;
}
.tool-card:hover {

  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  border-color: #ddd;
}
.tool-card .tag {

  border-radius: 10px;
  font-size: 11px;
  background: var(--red-light);
  color: var(--red);

  white-space: nowrap;

.tool-card h3 {

  margin-bottom: 6px; color: #1a1a1a;
}
.tool-card .desc {

  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.tool-card .meta {

  font-size: 12px; color: var(--text-muted);

.tool-card .meta .free {

.tool-card .btn-visit {

  background: var(--red); color: #fff;
  font-size: 12px; font-weight: 500;
  transition: opacity 0.15s;
}
.tool-card .btn-visit:hover { opacity: 0.85; }

.empty-state {
  text-align:center; padding:60px 20px; color: var(--text-muted);
}
.empty-state svg { width:64px; height:64px; stroke:#ccc; margin-bottom:12px; }

/* Footer */
.footer {
  text-align: center; padding: 24px 20px;
  color: var(--text-muted); font-size: 13px;
  border-top: 1px solid var(--border);
  max-width: 1300px; margin: 0 auto;

.footer a { color: var(--red); }

/* Mobile */
@media (max-width: 640px) {
  .header-inner { height:48px; gap:12px; }
  .logo { font-size:17px; }
  .nav { display:none; }
  .search-box input { width:100px; }
  .hero { padding: 32px 16px 24px; }
  .hero h1 { font-size: 22px; }
  .hero .stats { gap: 16px; }
  .tabs { padding-top: 14px; }
  .tab { padding: 6px 14px; font-size: 13px; }
  .tool-grid { grid-template-columns: 1fr; }
}
</style>

let activeCat = "all";

function renderTools(filterText = "") {
  const grid = document.getElementById("toolGrid");
  const q = filterText.toLowerCase().trim();
  let filtered = tools.filter(t => {
    const matchCat = activeCat === "all" || t.cat === activeCat;
    const matchSearch = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <p>没有找到匹配的工具</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(t => `
    <div class="tool-card">
      <span class="tag">${t.cat}</span>
      <h3>${t.name}</h3>
      <p class="desc">${t.desc}</p>
      <div class="meta">
        <span class="free">${t.free ? "免费" : "部分免费"}</span>
        <a href="${t.url}" target="_blank" rel="noopener" class="btn-visit">访问官网 →</a>
      </div>
    </div>
  `).join("");
}

function filterTools() {
  renderTools(document.getElementById("searchInput").value);
}

// Tab switching
document.getElementById("tabs").addEventListener("click", (e) => {
  const tab = e.target.closest(".tab");
  if (!tab) return;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  tab.classList.add("active");
  activeCat = tab.dataset.cat;
  renderTools(document.getElementById("searchInput").value);
});

// Initial render
renderTools();
</script>
